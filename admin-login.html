<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Irrigation Research Institute</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            background: #f4f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .login-panel {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-top: 5px solid #004b87;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
            padding: 34px;
        }

        .login-logo {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #004b87;
            display: block;
            margin: 0 auto 18px;
        }

        h1 {
            color: #004b87;
            text-align: center;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            text-align: center;
            margin-bottom: 28px;
            font-size: 14px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            border: 1px solid #c8d4df;
            padding: 12px;
            font-size: 15px;
            margin-bottom: 18px;
            outline: none;
        }

        input:focus {
            border-color: #004b87;
            box-shadow: 0 0 0 3px rgba(0,75,135,0.12);
        }

        button {
            width: 100%;
            border: 0;
            background: #004b87;
            color: #ffffff;
            padding: 13px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #00335e;
        }

        .link-button {
            width: auto;
            display: block;
            margin: 16px auto 0;
            padding: 0;
            border: 0;
            background: transparent;
            color: #004b87;
            font-weight: 700;
            text-decoration: none;
        }

        .link-button:hover {
            background: transparent;
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .message {
            min-height: 20px;
            margin: 14px 0 0;
            text-align: center;
            color: #004b87;
            font-weight: 700;
            font-size: 14px;
            line-height: 1.35;
        }

        .message.error {
            color: #b83232;
        }

        .message.success {
            color: #237a57;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #004b87;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .login-panel {
                padding: 24px 18px;
                box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            }

            .login-logo {
                width: 72px;
                height: 72px;
                margin-bottom: 14px;
            }

            h1 {
                font-size: 23px;
            }

            .subtitle {
                margin-bottom: 22px;
            }

            input,
            button {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <img class="login-logo" src="/irilogo.jpg" alt="Irrigation Research Institute logo">
        <h1>Admin Login</h1>
        <p class="subtitle">Employee Corner access</p>
        <form action="/login" method="POST" id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit">Login</button>
            <button class="link-button" type="button" id="forgotPasswordButton">Forgot Password?</button>
        </form>

        <form class="hidden" id="codeForm">
            <label for="resetCode">Enter 6 digit code</label>
            <input type="text" id="resetCode" name="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>

            <button type="submit">Verify Code</button>
            <button class="link-button" type="button" data-back-login>Back to Login</button>
        </form>

        <form class="hidden" id="newPasswordForm">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="6" required>

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="6" required>

            <button type="submit">Save New Password</button>
            <button class="link-button" type="button" data-back-login>Back to Login</button>
        </form>

        <p class="message" id="messageBox"></p>
        <a class="back-link" href="/">Back to Home</a>
    </main>

    <script>
        const loginForm = document.getElementById('loginForm');
        const codeForm = document.getElementById('codeForm');
        const newPasswordForm = document.getElementById('newPasswordForm');
        const forgotPasswordButton = document.getElementById('forgotPasswordButton');
        const messageBox = document.getElementById('messageBox');
        let resetToken = '';

        function showForm(form) {
            loginForm.classList.toggle('hidden', form !== loginForm);
            codeForm.classList.toggle('hidden', form !== codeForm);
            newPasswordForm.classList.toggle('hidden', form !== newPasswordForm);
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type || ''}`.trim();
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload || {})
            });
            const data = await response.json().catch(() => ({ message: 'Something went wrong.' }));
            if (!response.ok) {
                throw new Error(data.message || 'Something went wrong.');
            }
            return data;
        }

        forgotPasswordButton.addEventListener('click', async () => {
            forgotPasswordButton.disabled = true;
            showMessage('Sending 6 digit code...', '');
            try {
                const data = await postJson('/forgot-password/request');
                showMessage(data.message, 'success');
                showForm(codeForm);
                document.getElementById('resetCode').focus();
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                forgotPasswordButton.disabled = false;
            }
        });

        codeForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            showMessage('Verifying code...', '');
            try {
                const data = await postJson('/forgot-password/verify', {
                    code: document.getElementById('resetCode').value.trim()
                });
                resetToken = data.resetToken;
                showMessage(data.message, 'success');
                showForm(newPasswordForm);
                document.getElementById('newPassword').focus();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        newPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            showMessage('Saving password...', '');
            try {
                const data = await postJson('/forgot-password/reset', {
                    resetToken,
                    newPassword: document.getElementById('newPassword').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                });
                resetToken = '';
                codeForm.reset();
                newPasswordForm.reset();
                showMessage(data.message, 'success');
                showForm(loginForm);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        document.querySelectorAll('[data-back-login]').forEach((button) => {
            button.addEventListener('click', () => {
                resetToken = '';
                showMessage('', '');
                showForm(loginForm);
            });
        });
    </script>
</body>
</html>
